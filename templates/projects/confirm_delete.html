{% extends "base.html" %}
{% block title %}Удаление проекта{% endblock %}
{% block content %}
<div class="container" style="max-width:480px">
  <div class="card card-body">
    <h1 class="h5">Удалить проект «{{ object.name }}»?</h1>
    <p class="text-muted">Все связанные задачи также будут удалены.</p>
    <form method="post">
      {% csrf_token %}
      <button class="btn btn-danger">Удалить</button>
      <a href="{% url 'projects:detail' object.pk %}" class="btn btn-outline-secondary">Отмена</a>
    </form>
  </div>
</div>
{% endblock %}
