{% extends "base.html" %}
{% block title %}Удаление задолженности{% endblock %}
{% block content %}
<div class="container" style="max-width:480px">
  <div class="card card-body">
    <h1 class="h5">Удалить задолженность «{{ object.title }}»?</h1>
    <p class="text-muted">Связанные транзакции погашения останутся, но потеряют привязку к долгу.</p>
    <form method="post">
      {% csrf_token %}
      <button class="btn btn-danger">Удалить</button>
      <a href="{% url 'debts:detail' object.pk %}" class="btn btn-outline-secondary">Отмена</a>
    </form>
  </div>
</div>
{% endblock %}
