<div class="debtor-row border rounded p-3 mb-3">
  {% for hidden in debtor_form.hidden_fields %}{{ hidden }}{% endfor %}
  <div class="row g-2 align-items-end">
    <div class="col-md-4">
      <label class="form-label">{{ debtor_form.debtor_user.label }}</label>
      {{ debtor_form.debtor_user }}
    </div>
    <div class="col-md-4">
      <label class="form-label">{{ debtor_form.debtor_name.label }}</label>
      {{ debtor_form.debtor_name }}
    </div>
    <div class="col-md-3">
      <label class="form-label">{{ debtor_form.amount.label }}</label>
      {{ debtor_form.amount }}
    </div>
    <div class="col-md-1">
      {% if debtor_formset.can_delete %}
      <div class="form-check">
        {{ debtor_form.DELETE }}
        <label class="form-check-label small">Удал.</label>
      </div>
      {% endif %}
    </div>
  </div>
  {% if debtor_form.errors %}
  <div class="text-danger small mt-2">{{ debtor_form.errors }}</div>
  {% endif %}
</div>
